---
- name: Install packages
  homebrew:
    name:
      - python3
      - bash
      - fastfetch
      - tmux
      - fd
      - llvm
      - odin
      - yq
      - jq
      - git-lfs
      - eza
      - ncdu
      - bottom
      - cmake
      - unzip
      - bat
      - wget
      - gnu-tar
      - fontconfig
      - luarocks
      - axel
      - openjdk@21
      - colima
      - docker
      - docker-compose
      - docker-buildx
    state: present
- name: Install cask
  homebrew_cask:
    name: "{{ item }}"
    state: present
    install_options: adopt
  loop:
    - zen
    - ghostty
    - appcleaner
    - grandperspective
    - focusrite-control-2
    - eqmac
    - vlc
  register: result
  failed_when: >
    result.failed and 'It seems there is already an App' not in result.msg
- name: Check if Colima is running
  command: colima list
  register: colima_list
  failed_when: false
  changed_when: false
- name: Start Colima
  command: colima start --cpu 4 --memory 8
  when: "'Running' not in colima_list.stdout + colima_list.stderr"
  async: 600
  poll: 10
- name: Ensure docker cli-plugins directory exists
  file:
    path: "{{ ansible_facts['env'].HOME }}/.docker/cli-plugins"
    state: directory
- name: Register docker buildx as a CLI plugin
  file:
    src: /opt/homebrew/opt/docker-buildx/bin/docker-buildx
    dest: "{{ ansible_facts['env'].HOME }}/.docker/cli-plugins/docker-buildx"
    state: link
- name: Register docker compose as a CLI plugin
  file:
    src: /opt/homebrew/opt/docker-compose/bin/docker-compose
    dest: "{{ ansible_facts['env'].HOME }}/.docker/cli-plugins/docker-compose"
    state: link
- name: Ensure /usr/local/bin exists
  file:
    path: /usr/local/bin
    state: directory
  become: true
- name: Install rustup
  shell: >
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs |
    sh -s -- -y --default-toolchain 1.95.0 --profile minimal --no-modify-path
  args:
    creates: "{{ ansible_facts['env'].HOME }}/.cargo/bin/rustup"
- name: Pin Rust toolchain to 1.95.0
  shell: "{{ ansible_facts['env'].HOME }}/.cargo/bin/rustup default 1.95.0"
- name: Install ripgrep
  include_role:
    name: common/shared/ripgrep
- name: Install zoxide
  include_role:
    name: common/shared/zoxide
- name: Create symlink for tmux
  file:
    src: /opt/homebrew/bin/tmux
    dest: /usr/local/bin/tmux
    state: link
  become: true
- name: Install go
  include_role:
    name: common/shared/go
  vars:
    version: 1.24.2
    os: darwin
    arch: arm64
- name: Install zig
  include_role:
    name: common/shared/zig
  vars:
    version: 0.16.0
    os: macos
    arch: aarch64
- name: Copy font files
  copy:
    src: '{{playbook_dir}}/../NerdFonts/'
    dest: '/Library/Fonts/'
  become: true
- name: Remove .config
  file:
    path: '${HOME}/.config'
    state: absent
- name: Create .config
  file:
    state: directory
    path: '${HOME}/.config'
- name: Setup zsh
  include_role:
    name: common/shared/zsh
- name: Download and install fnm
  include_role:
    name: common/shared/fnm
- name: Install lazySQL
  include_role:
    name: common/shared/lazysql
- name: Install lazydocker
  include_role:
    name: common/shared/lazydocker
- name: Install lazyjournal
  include_role:
    name: common/shared/lazyjournal
- name: Install lazygit
  include_role:
    name: common/shared/lazygit
- name: Setup tmux
  include_role:
    name: common/shared/tpm
- name: Setup nvim
  include_role:
    name: common/shared/nvim
  vars:
    os: macos
    arch: arm64
    version: 0.12.2
- name: Copy files
  copy:
    src: '{{ item }}'
    dest: '${HOME}/.config/'
  loop:
    - '{{playbook_dir}}/../ghostty'
    - '{{playbook_dir}}/../fastfetch'
