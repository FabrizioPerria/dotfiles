---
- name: Check if go is installed
  stat:
    path: /usr/local/go/bin/go
  register: go_binary

- name: Check version of go if it is installed
  command: /usr/local/go/bin/go version
  register: go_version
  when: go_binary.stat.exists
  ignore_errors: true

- when: not go_binary.stat.exists or go_version is failed or go_version.stdout.find(version) == -1
  block:
    - name: Remove any existing Go installation
      file:
        path: /usr/local/go
        state: absent
      become: true
      when: go_binary.stat.exists

    - name: Download Go
      get_url:
        url: https://go.dev/dl/go{{version}}.{{os}}-{{arch}}.tar.gz
        dest: /tmp/go.tar.gz

    - name: Extract go.tar.gz
      unarchive:
        src: "/tmp/go.tar.gz"
        dest: "/usr/local/"
        remote_src: true
      become: true

    - name: Remove Go tarball
      file:
        path: /tmp/go.tar.gz
        state: absent

    - name: Install Go tools
      become: true
      environment:
        PATH: "/usr/local/go/bin:{{ ansible_facts['env'].PATH }}"
      shell: |
        /usr/local/go/bin/go install golang.org/x/tools/gopls@v0.17.1
        /usr/local/go/bin/go install github.com/go-delve/delve/cmd/dlv@v1.24.2
        /usr/local/go/bin/go install golang.org/x/tools/cmd/goimports@v0.31.0
